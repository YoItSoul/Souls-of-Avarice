[triggers]

  # Universal defaults - applied to every trigger below unless overridden
  [triggers.universal]
    active_cooldown = "0"
    fade_in = "60"
    fade_out = "80"
    persistence = "0"
    ticks_before_active = "20"
    ticks_before_audio = "0"
    ticks_between_audio = "200"

  # ==== Menus (priority 100) ====
  [triggers.menu]
    type = "menu"
    priority = "100"
    fade_in = "40"
    fade_out = "60"

  [triggers.loading]
    type = "loading"
    priority = "95"
    fade_in = "20"
    fade_out = "40"

  # ==== Bosses (priority 90 - interrupts everything) ====
  [triggers.boss_dragon]
    type = "mob"
    resource_name = ["minecraft:ender_dragon"]
    priority = "90"
    persistence = "100"
    fade_in = "30"
    fade_out = "60"

  [triggers.boss_wither]
    type = "mob"
    resource_name = ["minecraft:wither"]
    priority = "90"
    persistence = "100"

  [triggers.boss_warden]
    type = "mob"
    resource_name = ["minecraft:warden"]
    priority = "90"
    persistence = "100"

  [triggers.boss_twilight]
    type = "mob"
    resource_name = [
      "twilightforest:naga",
      "twilightforest:lich",
      "twilightforest:hydra",
      "twilightforest:ur_ghast",
      "twilightforest:minoshroom",
      "twilightforest:knight_phantom",
      "twilightforest:snow_queen",
      "twilightforest:alpha_yeti"
    ]
    priority = "90"
    persistence = "100"

  [triggers.boss_aether]
    type = "mob"
    resource_name = [
      "aether:slider",
      "aether:valkyrie_queen",
      "aether:sun_spirit"
    ]
    priority = "90"
    persistence = "100"

  [triggers.boss_generic]
    type = "mob"
    resource_name = [
      "minecraft:elder_guardian"
    ]
    priority = "85"

  # ==== Horde combat - 3+ hostile mobs nearby (priority 70) ====
  # Note: combat_music mod also handles this. If overlap is noisy, disable one.
  [triggers.horde]
    type = "mob"
    resource_name = ["minecraft:zombie","minecraft:skeleton","minecraft:spider","minecraft:creeper","minecraft:husk","minecraft:stray"]
    priority = "70"
    targets_required = "3"
    detection_range = "24"

  # ==== Special dimensions (priority 60) ====
  [triggers.dim_nether]
